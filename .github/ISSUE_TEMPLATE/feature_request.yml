name: Feature request
description: Suggest a new feature, framework adapter, or storage backend
title: "[feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature.

        Before submitting, please:
        - Search [existing issues](https://github.com/kjgpta/tracelens/issues) and the [roadmap](https://github.com/kjgpta/tracelens/discussions/categories/ideas).
        - Read [CONTRIBUTING.md](https://github.com/kjgpta/tracelens/blob/main/docs/contributing.md) — non-goals and design constraints are documented there.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the user-facing problem first. What can't you do today, or what's painful about how you do it?
      placeholder: |
        I'm running tracelens against X and I can't ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A concrete sketch of the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area of tracelens would this touch?
      options:
        - Storage backend (SQLite, future Postgres / remote)
        - Framework adapter (LangChain, LangGraph, future others)
        - Server / REST / WebSocket
        - UI / dashboard
        - CLI
        - Sampling / production knobs
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Willing to contribute?
      description: Optional — if you'd like to send a PR, indicate here so we can scope before you start.
      options:
        - label: I'd like to send a PR for this if accepted.
        - label: I'd appreciate a maintainer pointer on where to start.
