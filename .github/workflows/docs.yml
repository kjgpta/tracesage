name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # needed for git-revision-date plugins, if added later

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install MkDocs + Material
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "mkdocs>=1.6" \
            "mkdocs-material>=9.5" \
            "mkdocs-autorefs>=1.0" \
            "pymdown-extensions>=10.7"

      - name: Build site
        # `--strict` fails the build on any broken link. All docs (incl. changelog,
        # contributing, releasing) live under docs/, so it passes — keep it as a gate.
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
