name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # Trusted Publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate wheel (twine check + import smoke)
        run: |
          python -m pip install twine
          twine check dist/*
          python -m pip install dist/*.whl
          python -c "from tracesage import TraceSage, TraceSageConfig, __version__; print('import OK', __version__)"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    # Create a GitHub Release for the tag, only after PyPI publish succeeds, with
    # notes pulled from docs/changelog.md and the built sdist/wheel attached.
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the Release
    steps:
      - uses: actions/checkout@v6
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Extract changelog section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' docs/changelog.md > release-notes.md
          # Fallback if the version section is missing.
          if [ ! -s release-notes.md ]; then
            echo "See [docs/changelog.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/changelog.md) for release notes." > release-notes.md
          fi
          echo "----- notes for ${GITHUB_REF_NAME} -----"
          cat release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: false
