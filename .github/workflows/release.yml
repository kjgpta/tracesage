name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # Trusted Publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build
      - name: Stamp the PyPI version badge to this tag (so the packaged README matches)
        run: |
          python - "${GITHUB_REF_NAME#v}" <<'PY'
          import re, sys
          v = sys.argv[1]
          s = open("README.md", encoding="utf-8").read()
          s = re.sub(r"(img\.shields\.io/badge/pypi-v)[0-9][0-9A-Za-z.]*(-)", r"\g<1>" + v + r"\g<2>", s)
          open("README.md", "w", encoding="utf-8").write(s)
          PY
          grep -n "badge/pypi-v" README.md
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate wheel (twine check + import smoke)
        run: |
          python -m pip install twine
          twine check dist/*
          python -m pip install dist/*.whl
          python -c "from tracesage import TraceSage, TraceSageConfig, __version__; print('import OK', __version__)"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    # Create a GitHub Release for the tag, only after PyPI publish succeeds, with
    # notes pulled from docs/changelog.md and the built sdist/wheel attached.
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the Release
    steps:
      - uses: actions/checkout@v7
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Extract changelog section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' docs/changelog.md > release-notes.md
          # Fallback if the version section is missing.
          if [ ! -s release-notes.md ]; then
            echo "See [docs/changelog.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/changelog.md) for release notes." > release-notes.md
          fi
          echo "----- notes for ${GITHUB_REF_NAME} -----"
          cat release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: false

  stamp-readme-badge:
    # After a successful publish, stamp the README's PyPI version badge on `main`
    # so the GitHub page shows the just-released version (the build job already
    # stamped it into the packaged README for the PyPI page). Runs only on a tag
    # that matches the current main version — keeps the badge in lock-step with
    # what actually shipped, never ahead of it.
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push the badge update to main
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - name: Stamp the PyPI version badge to ${{ github.ref_name }}
        run: |
          python3 - "${GITHUB_REF_NAME#v}" <<'PY'
          import re, sys
          v = sys.argv[1]
          s = open("README.md", encoding="utf-8").read()
          s = re.sub(r"(img\.shields\.io/badge/pypi-v)[0-9][0-9A-Za-z.]*(-)", r"\g<1>" + v + r"\g<2>", s)
          open("README.md", "w", encoding="utf-8").write(s)
          PY
          grep -n "badge/pypi-v" README.md
      - name: Commit + push if the badge changed
        run: |
          if git diff --quiet -- README.md; then
            echo "Badge already at ${GITHUB_REF_NAME} — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: stamp PyPI version badge to ${GITHUB_REF_NAME} [skip ci]"
          git push origin main
