site_name: tracesage
site_description: Production observability for LangChain & LangGraph multi-agent systems.
site_url: https://kjgpta.github.io/tracesage/
site_author: tracesage contributors

repo_url: https://github.com/kjgpta/tracesage
repo_name: kjgpta/tracesage
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/tracesage-icon.png
  favicon: assets/tracesage-icon.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kjgpta/tracesage
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/tracesage/

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - autorefs

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Developer guide: development.md
  - Concepts: concepts.md
  - Configuration: configuration.md
  - CLI: cli.md
  - API reference: api.md
  - MCP support: mcp.md
  - Production: production.md
  - Extending: extending.md
  - Comparison: comparison.md
  - Examples: examples.md
  - Changelog: changelog.md
  - Contributing: contributing.md
  - Releasing: releasing.md

watch:
  - docs/
  - README.md
